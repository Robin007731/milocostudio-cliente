
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en Mantenimiento</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #4ecca3;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #a2a2a2;
        }

        .creator-tag {
            margin-top: 30px;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .creator-name {
            color: #4ecca3;
            font-weight: bold;
            text-decoration: none;
        }

        /* Animación simple de "pulso" para el icono */
        .pulse {
            display: inline-block;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon pulse">🛠️</div>
        <h1>Estamos mejorando</h1>
        <p>Nuestra aplicación se encuentra actualmente en mantenimiento para brindarte una mejor experiencia. Volveremos a estar en línea muy pronto.</p>
        
        <div class="creator-tag">
            Desarrollado con ❤️ por <br>
            <span class="creator-name">Robinson Chagas</span>
        </div>
    </div>

</body>
</html>
