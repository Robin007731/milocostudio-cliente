<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MILOCOSTUDIO | Reservas</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffffff; --card: rgba(30, 30, 30, 0.95); --text: #ffffff;
            --red-alert: #ff4b4b;
        }

        body { 
            margin: 0; background: #000; color: var(--text); 
            font-family: 'Montserrat', sans-serif; min-height: 100vh; 
        }

        /* --- PANTALLA DE CIERRE FINAL --- */
        #bloqueo-app {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; z-index: 10000;
            display: none; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 30px; box-sizing: border-box;
        }

        /* --- BANNER DE CUENTA REGRESIVA INFERIOR --- */
        .footer-counter {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(20, 20, 20, 0.95);
            border-top: 2px solid var(--red-alert);
            padding: 15px 0;
            text-align: center;
            z-index: 999;
            backdrop-filter: blur(10px);
        }
        .footer-counter p {
            margin: 0; font-size: 0.8rem; letter-spacing: 1.5px; font-weight: 400;
            color: #ccc;
        }
        #timer { 
            display: block; font-size: 1.4rem; font-weight: 700; 
            color: var(--red-alert); margin-top: 5px; font-family: monospace;
        }

        .bg-fixed { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('199797.jpg'); 
            background-size: cover; background-position: center; z-index: -1; 
        }
        
        header { text-align: center; padding: 50px 0; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold); margin: 0; letter-spacing: 6px; text-transform: uppercase; }

        .content-wrapper { padding-bottom: 120px; width: 100%; }
        .section { display: none; max-width: 450px; margin: 0 auto; padding: 0 20px; }
        .active { display: block; }
        
        .form { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-hero { background: none; color: #fff; border: 2px solid #fff; padding: 20px 50px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="bloqueo-app">
    <h2 style="font-family: 'Playfair Display', serif; color: var(--red-alert); margin-bottom: 20px;">ACCESO RESTRINGIDO</h2>
    <p style="font-size: 1.1rem; line-height: 1.6; max-width: 400px; font-weight: 300;">
        La extensión de su base de datos ha caducado. 
        <br><br>
        <strong>Contactese con su desarrollador para ajustar su base de datos a su medida.</strong>
    </p>
</div>

<div class="bg-fixed"></div>

<header>
    <h1>MILOCOSTUDIO</h1>
</header>

<div class="content-wrapper">
    <div class="section active" id="inicio" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 30vh;">
        <button class="btn-hero" onclick="mostrar('datos')">Reservar Turno</button>
    </div>

    <div class="section" id="datos">
        <div class="form">
            <h3 style="text-align:center; margin-bottom: 20px;">INGRESE SUS DATOS</h3>
            <button style="width:100%; padding:15px; background:white; color:black; border:none; font-weight:700;">SIGUIENTE</button>
        </div>
    </div>
</div>

<div class="footer-counter" id="banner">
    <p>LA EXTENSIÓN DE SU BASE DE DATOS CADUCARÁ EN:</p>
    <span id="timer">00:00:00</span>
</div>

<script>
    // Configuración de la fecha límite: Hoy a las 23:59:59
    const limite = new Date();
    limite.setHours(23, 59, 59, 999);

    function contador() {
        const ahora = new Date().getTime();
        const resto = limite - ahora;

        if (resto <= 0) {
            document.getElementById("bloqueo-app").style.display = "flex";
            document.getElementById("banner").style.display = "none";
            return;
        }

        const h = Math.floor((resto / (1000 * 60 * 60)) % 24);
        const m = Math.floor((resto / 1000 / 60) % 60);
        const s = Math.floor((resto / 1000) % 60);

        document.getElementById("timer").innerText = 
            (h < 10 ? "0"+h : h) + "h " + 
            (m < 10 ? "0"+m : m) + "m " + 
            (s < 10 ? "0"+s : s) + "s";
    }

    setInterval(contador, 1000);
    contador();

    function mostrar(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id !== 'inicio') document.getElementById('inicio').style.display = 'none';
    }
</script>

</body>
</html>
